# Local development overrides. NOT auto-loaded (file is not named
# docker-compose.override.yml), so `docker compose up` runs the production base.
# Opt into hot reload explicitly:
#   docker compose -f docker-compose.yaml -f docker-compose.dev.yml up
services:
  go-app:
    build:
      # Swap the production build for the Air-based dev image.
      dockerfile: Dockerfile.dev
    # Bind-mount the source so Go rebuilds (Air) and static asset edits
    # (CSS/JS/HTML served from disk) both reflect without an image rebuild.
    volumes:
      - .:/app
      - go-build-cache:/root/.cache/go-build
      - go-mod-cache:/go/pkg/mod
    # Expose the app directly on the host for local access (base only exposes
    # it to the Caddy network).
    ports:
      - "${PORT:-9000}:9000"
    command: ["air", "-c", ".air.toml"]

volumes:
  go-build-cache:
  go-mod-cache:
