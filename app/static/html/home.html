<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lobby - Chess</title>
    <link rel="icon" type="image/png" href="/static/images/wQ.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/theme.css">
    <link rel="stylesheet" href="/static/css/game.css">
    <link rel="stylesheet" href="/static/css/home.css?v=7">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <!-- apply saved theme before paint to avoid flash -->
    <script>
        (function () {
            var t = localStorage.getItem("theme") || "dark";
            document.documentElement.setAttribute("data-theme", t);
        })();
    </script>
</head>

<body>
    <!-- Top app bar -->
    <header class="topbar">
        <a class="brand" href="/">
            <span class="brand-mark">♞</span>
            <span class="brand-name">Chess</span>
        </a>
        <div class="topbar-actions">
            <button id="theme-toggle" class="icon-btn" aria-label="Toggle theme" title="Toggle theme">
                <i class="fa fa-moon"></i>
            </button>
        </div>
    </header>

    <main class="lobby">
        <!-- Left: identity + primary actions -->
        <section class="console">
            <div class="console-head">
                <span class="eyebrow">Ready to play?</span>
                <h1 class="console-title">Hey <span id="user-name">player</span></h1>
                <p class="console-sub">Start a game, take on the bot, or join a friend with a code.</p>
            </div>

            <button id="create-game" class="btn-create">
                <span class="btn-create-icon"><i class="fa fa-plus"></i></span>
                <span class="btn-create-text">
                    <strong>Create a game</strong>
                    <small>Random side · share the code to invite</small>
                </span>
                <i class="fa fa-arrow-right btn-create-go"></i>
            </button>

            <div class="bot-block">
                <button id="create-bot-game" class="btn-bot">
                    <i class="fa fa-robot"></i>
                    <span>Play against the bot</span>
                </button>
                <div class="bot-levels" role="group" aria-label="Bot difficulty">
                    <button type="button" class="bot-level" data-level="easy">Easy</button>
                    <button type="button" class="bot-level" data-level="medium">Medium</button>
                    <button type="button" class="bot-level" data-level="hard">Hard</button>
                </div>
            </div>

            <div class="join-divider"><span>or join with a code</span></div>

            <div class="join-row">
                <input type="text" id="invite-code" placeholder="Paste an invite code" autocomplete="off" spellcheck="false">
                <button id="join-game" class="btn-join">Join</button>
            </div>
        </section>

        <!-- Right: tabbed games browser -->
        <section class="games-panel">
            <div class="games-head">
                <div class="tabs" role="tablist">
                    <button type="button" class="tab is-active" data-tab="mine" role="tab">
                        Your games <span class="tab-count" id="count-mine">0</span>
                    </button>
                    <button type="button" class="tab" data-tab="open" role="tab">
                        Open tables <span class="tab-count" id="count-open">0</span>
                    </button>
                    <button type="button" class="tab" data-tab="watch" role="tab">
                        Watch <span class="tab-count" id="count-watch">0</span>
                    </button>
                </div>
                <button id="refresh-games" class="games-refresh icon-btn" title="Refresh" aria-label="Refresh games">
                    <i class="fa fa-rotate-right"></i>
                </button>
            </div>
            <div id="games-list" class="games-list"></div>
        </section>
    </main>

    <script src="/static/js/index.js"></script>
    <script src="/static/js/theme.js"></script>
    <script src="/static/js/home.js?v=7"></script>
</body>

</html>
